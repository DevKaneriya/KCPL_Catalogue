kind = "web"
previewPath = "/"
title = "KCPL Catalog Admin"
version = "1.0.0"
id = "artifacts/kcpl-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22260
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/kcpl-admin run dev"

[services.env]
PORT = "22260"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/kcpl-admin", "run", "build"]
publicDir = "artifacts/kcpl-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
