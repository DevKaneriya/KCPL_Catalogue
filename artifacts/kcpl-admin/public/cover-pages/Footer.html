<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCPL Contact</title>

  <style>
    .custom-page-container {
      max-width: 900px;
      height: 1120px;
      margin: 20px auto;
      background: #ffffff;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      position: relative;
    }

    /* Bottom Content */
    .bottom-content {
      position: absolute;
      bottom: 80px;
      width: 100%;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 🔥 ensures perfect center */
      text-align: center;
    }

    /* Logo */
    .page-logo {
      width: 120px;
      margin-bottom: 20px;
      display: block;
    }

    /* Address */
    .address {
      font-size: 13px;
      line-height: 1.8;
      color: #475569;
    }

    /* Contact */
    .contact {
      margin-top: 10px;
      font-size: 12px;
      color: #475569;
    }
  </style>

</head>

<body>

  <div class="custom-page-container">

    <div class="bottom-content">

      <img src="/images/logo.png" class="page-logo" alt="KCPL Logo">

      <div class="address">
        KARNAVATI CAR AIR CONDITIONERS PVT. LTD.<br>
        PLOT NO.501/4, NEAR EHTOS CO, TAJPUR ROAD,<br>
        CHANGODAR, AHMEDABAD 382213
      </div>

      <div class="contact">
        +91 98251 30293 &nbsp; | &nbsp;
        customercare@kcplauto.com &nbsp; | &nbsp;
        info@kcplauto.com
      </div>

    </div>

  </div>

</body>

</html>
