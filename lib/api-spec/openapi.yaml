openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: KCPL Catalog Automation System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: roles
  - name: products
  - name: categories
  - name: content
  - name: catalog
  - name: logs
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List roles
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      operationId: createRole
      tags: [roles]
      summary: Create role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/{id}:
    put:
      operationId: updateRole
      tags: [roles]
      summary: Update role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      operationId: deleteRole
      tags: [roles]
      summary: Delete role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductCategory"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new product category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a product category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a product category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a product category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: applicationCategory
          in: query
          schema:
            type: string
        - name: productType
          in: query
          schema:
            type: string
        - name: brandName
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product SKU
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/filters:
    get:
      operationId: getProductFilters
      tags: [products]
      summary: Get distinct filter values for products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: applicationCategory
          in: query
          schema:
            type: string
        - name: productType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Distinct filter values
          content:
            application/json:
              schema:
                type: object
                properties:
                  applicationCategories:
                    type: array
                    items:
                      type: string
                  productTypes:
                    type: array
                    items:
                      type: string
                  brands:
                    type: array
                    items:
                      type: string
  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Product deleted

  /catalog-index:
    get:
      operationId: getCatalogIndex
      tags: [catalog]
      summary: Get the auto-generated catalog index
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Catalog index tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndexNode"

  /content-pages:
    get:
      operationId: listContentPages
      tags: [content]
      summary: List all content pages
      responses:
        "200":
          description: List of content pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentPage"
    post:
      operationId: createContentPage
      tags: [content]
      summary: Create a new content page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentPageRequest"
      responses:
        "201":
          description: Content page created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPage"

  /content-pages/reorder:
    put:
      operationId: reorderContentPages
      tags: [content]
      summary: Reorder content pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: integer
              required: [ids]
      responses:
        "200":
          description: Pages reordered

  /content-pages/{id}:
    get:
      operationId: getContentPage
      tags: [content]
      summary: Get a content page by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPage"
    put:
      operationId: updateContentPage
      tags: [content]
      summary: Update a content page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentPageRequest"
      responses:
        "200":
          description: Page updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPage"
    delete:
      operationId: deleteContentPage
      tags: [content]
      summary: Delete a content page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Page deleted

  /catalog/export:
    post:
      operationId: exportCatalog
      tags: [catalog]
      summary: Export catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportCatalogRequest"
      responses:
        "200":
          description: Export result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

  /catalog/stats:
    get:
      operationId: getCatalogStats
      tags: [catalog]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogStats"

  /catalog/preview-data:
    post:
      operationId: getCatalogPreviewData
      tags: [catalog]
      summary: Get catalog data for preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sections:
                  type: array
                  items:
                    type: string
                categoryIds:
                  type: array
                  items:
                    type: integer
                applicationCategory:
                  type: string
                brandName:
                  type: string
                productType:
                  type: string
              required: [sections]
      responses:
        "200":
          description: Preview data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogPreviewData"

  /activity-logs:
    get:
      operationId: listActivityLogs
      tags: [logs]
      summary: List activity logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogResponse"

  /masters/brands:
    get:
      operationId: getBrands
      tags: [masters]
      parameters:
        - name: productTypeId
          in: query
          schema: { type: integer }
          description: Filter by product type ID
        - name: applicationCategoryId
          in: query
          schema: { type: integer }
          description: Filter by application category ID
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      operationId: createBrand
      tags: [masters]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, productTypeId, applicationCategoryId]
              properties:
                name: { type: string }
                productTypeId: { type: integer }
                applicationCategoryId: { type: integer }
      responses:
        "201":
          description: Created brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /masters/application-categories:
    get:
      operationId: getAppCats
      tags: [masters]
      parameters:
        - name: productTypeId
          in: query
          schema: { type: integer }
          description: Filter by product type ID
      responses:
        "200":
          description: List of application categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppCat"
    post:
      operationId: createAppCat
      tags: [masters]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, productTypeId]
              properties:
                name: { type: string }
                productTypeId: { type: integer }
      responses:
        "201":
          description: Created application category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppCat"

  /masters/product-types:
    get:
      operationId: getProductTypesMaster
      tags: [masters]
      responses:
        "200":
          description: List of product types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductType"
    post:
      operationId: createProductType
      tags: [masters]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "201":
          description: Created product type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductType"

components:
  schemas:
    Brand:
      type: object
      required: [id, name, productTypeId, applicationCategoryId]
      properties:
        id: { type: integer }
        name: { type: string }
        productTypeId: { type: integer }
        applicationCategoryId: { type: integer }
        createdAt: { type: string, format: date-time }
    AppCat:
      type: object
      required: [id, name, productTypeId]
      properties:
        id: { type: integer }
        name: { type: string }
        productTypeId: { type: integer }
        createdAt: { type: string, format: date-time }
    ProductType:
      type: object
      required: [id, name]
      properties:
        id: { type: integer }
        name: { type: string }
        createdAt: { type: string, format: date-time }
    HealthStatus:
      type: object
      properties:
        status: { type: string }
        message: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        roleId:
          type: integer
        roleName:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            type: string
      required: [id, username, isActive, createdAt]

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        roleId:
          type: integer
      required: [username, password]

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        roleId:
          type: integer
        isActive:
          type: boolean

    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        userCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, permissions, userCount, createdAt]

    CreateRoleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
      required: [name, permissions]

    ProductCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        slug:
          type: string
        fieldSchema:
          type: object
          additionalProperties: true
        productCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, slug, productCount, createdAt, updatedAt]

    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        slug:
          type: string
        fieldSchema:
          type: object
          additionalProperties: true

    Product:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        applicationCategory:
          type: string
        productType:
          type: string
        brandName:
          type: string
        kcplCode:
          type: string
        modelName:
          type: string
        size:
          type: string
        adaptablePartNo:
          type: string
        imageUrl:
          type: string
        specifications:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, categoryId, createdAt, updatedAt]

    CreateProductRequest:
      type: object
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        applicationCategory:
          type: string
        productType:
          type: string
        brandName:
          type: string
        kcplCode:
          type: string
        modelName:
          type: string
        size:
          type: string
        adaptablePartNo:
          type: string
        imageUrl:
          type: string
        specifications:
          type: object
          additionalProperties: true

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required: [products, total, page, limit, totalPages]

    IndexNode:
      type: object
      properties:
        brand:
          type: string
        sizes:
          type: array
          items:
            type: object
            properties:
              size:
                type: string
              products:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
            required: [size, products]
      required: [brand, sizes]

    ContentPage:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        imageUrl:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, sortOrder, createdAt, updatedAt]

    CreateContentPageRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        imageUrl:
          type: string
        sortOrder:
          type: integer

    ExportCatalogRequest:
      type: object
      properties:
        format:
          type: string
          enum: [pdf, doc, cdr]
        sections:
          type: array
          items:
            type: string
        categoryIds:
          type: array
          items:
            type: integer
      required: [format, sections]

    ExportResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        downloadUrl:
          type: string
        exportedAt:
          type: string
          format: date-time
      required: [success, message, exportedAt]

    CatalogPreviewData:
      type: object
      properties:
        contentPages:
          type: array
          items:
            $ref: "#/components/schemas/ContentPage"
        categories:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              slug:
                type: string
              products:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
            required: [id, name, slug, products]
        index:
          type: array
          items:
            $ref: "#/components/schemas/IndexNode"
        sections:
          type: array
          items:
            type: string
      required: [contentPages, categories, index, sections]

    CatalogStats:
      type: object
      properties:
        totalRadiators:
          type: integer
        totalCondensers:
          type: integer
        totalProducts:
          type: integer
        lastUpdated:
          type: string
          format: date-time
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        categoryBreakdown:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required: [name, count]
      required: [totalRadiators, totalCondensers, totalProducts, lastUpdated, recentActivity, categoryBreakdown]

    ActivityLog:
      type: object
      properties:
        id:
          type: integer
        user:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: integer
        details:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, user, action, entityType, createdAt]

    ActivityLogResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
